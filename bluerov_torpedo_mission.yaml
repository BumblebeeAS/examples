# BlueROV2 sim + behaviour-tree torpedo mission.

session_name: bluerov_torpedo_mission
start_directory: /root/HOST/bluerov_ws

options:
  mouse: "on"
  history-limit: 100000

windows:
  - window_name: mission
    layout: tiled
    panes:
      - pane_name: sim
        shell_command:
          - source /opt/ros/humble/setup.bash
          - source install/setup.bash
          - ros2 launch bluerov_sim bluerov_sim.launch.py
            world_name:=robosub_2025_pool
            ardusub:=true
            mavros:=true
            gui:=true
            paused:=false

      - pane_name: controls
        shell_command:
          - source /opt/ros/humble/setup.bash
          - source install/setup.bash
          - ros2 launch bluerov_tasks bluerov_controls.launch.py

      - pane_name: choice
        shell_command:
          - source /opt/ros/humble/setup.bash
          - source install/setup.bash
          - 'echo "Fish/shark choice server — BT reads /bluerov/choice/get_is_fish at startup (default fish)."'
          - 'echo "  pick FISH : ros2 service call /bluerov/choice/set_is_fish std_srvs/srv/SetBool \"{data: true}\""'
          - 'echo "  pick SHARK: ros2 service call /bluerov/choice/set_is_fish std_srvs/srv/SetBool \"{data: false}\""'
          - ros2 run bluerov_tasks choice_server_node.py

      - pane_name: cluster
        shell_command:
          - source /opt/ros/humble/setup.bash
          - source install/setup.bash
          - ros2 launch bluerov_tasks bluerov_cluster.launch.py

      - pane_name: vision
        shell_command:
          - source /opt/ros/humble/setup.bash
          - source install/setup.bash
          - ros2 launch bluerov_tasks bluerov_torpedo_vision.launch.py

      - pane_name: bt
        shell_command:
          - source /opt/ros/humble/setup.bash
          - source install/setup.bash
          - ros2 launch bluerov_tasks bluerov_torpedo_bt.launch.py

      - pane_name: foxglove
        shell_command:
          - source /opt/ros/humble/setup.bash
          - source install/setup.bash
          - ros2 launch foxglove_bridge foxglove_bridge_launch.xml
            use_sim_time:=true
