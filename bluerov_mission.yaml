# BlueROV2 sim + behaviour-tree square mission.

session_name: bluerov_mission
start_directory: /root/HOST/bluerov_ws

options:
  mouse: "on"
  history-limit: 100000

windows:
  - window_name: mission
    layout: tiled
    panes:
      - pane_name: sim
        shell_command:
          - source /opt/ros/humble/setup.bash
          - source install/setup.bash
          - ros2 launch bluerov_sim bluerov_sim.launch.py
            world_name:=robosub_2025_pool
            ardusub:=true
            mavros:=true
            gui:=true
            paused:=false

      - pane_name: bt_mission
        shell_command:
          - source /opt/ros/humble/setup.bash
          - source install/setup.bash
          - ros2 launch bluerov_tasks bluerov_square_bt.launch.py
