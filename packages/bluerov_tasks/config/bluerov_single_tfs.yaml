# Static TFs for BlueROV2 bin / torpedo missions.
#
# BlueROV-specific subset of the RoboSub bin and torpedo task frames.
# The geometric offsets match mission_planner_2/cfg/single_tfs.yaml, while
# the parent frames use the current indexed cluster outputs.
#
# The actuator TFs (dropper, torpedo_shooter_*) are NOT listed here —
# they're emitted by robot_state_publisher from bluerov2.urdf.
#
# NOTE: the clustered parent frames carry the `_0` suffix because cluster_poses
# broadcasts each of its top_k results as "<clustered_child_frame_id>_<i>"
# (cluster_poses_node.py); with top_k=1 the single result is "..._0". (The old
# cluster_tf broadcast the bare name — do not drop the _0 unless reverting.)

torpedo:
  - name: torpedo_centre
    x: 0.3
    y: 0.3
    parent_frame_id: "torpedo/yolo/clustered_0"
    child_frame_id: "torpedo/centre"
  - name: torpedo_1_yolo
    parent_frame_id: "torpedo/yolo/clustered_0"
    child_frame_id: "torpedo_1/yolo"
  - name: torpedo_2_yolo
    parent_frame_id: "torpedo/yolo/clustered_0"
    child_frame_id: "torpedo_2/yolo"

bin:
  - name: bin_center
    x: 0.1524
    y: 0.3048
    parent_frame_id: "bin/yolo/clustered_0"
    child_frame_id: "bin/centre"
  - name: bin_fish
    x: 0.1524
    y: 0.4568
    parent_frame_id: "bin/clustered_0"
    child_frame_id: "bin/fish"
  - name: bin_shark
    x: 0.1524
    y: 0.1524
    parent_frame_id: "bin/clustered_0"
    child_frame_id: "bin/shark"
  - name: bin_fish_rotated
    x: 0.1524
    y: 0.1524
    parent_frame_id: "bin/clustered_0"
    child_frame_id: "bin/fish/rotated"
  - name: bin_shark_rotated
    x: 0.1524
    y: 0.4568
    parent_frame_id: "bin/clustered_0"
    child_frame_id: "bin/shark/rotated"
