# Grouped (viewing-frame) static TFs for BlueROV2 bin/torpedo missions.
#
# Each block adds child frames to multiple parents in one shot, e.g. a
# top-view frame above every bin/{centre,fish,shark}. Offsets describe
# how far from the target the vehicle hovers to observe it.
#

torpedo:
  - name: torpedo_1_fish
    suffix: fish
    parents:
      - "torpedo_1_0"
      - "torpedo_1/yolo"
    x: 0.408
    y: 0.391
  - name: torpedo_1_shark
    suffix: shark
    parents:
      - "torpedo_1_0"
      - "torpedo_1/yolo"
    x: 0.268
    y: 0.09
  - name: torpedo_2_fish
    suffix: fish
    parents:
      - "torpedo_2_0"
      - "torpedo_2/yolo"
    x: 0.429
    y: 0.084
  - name: torpedo_2_shark
    suffix: shark
    parents:
      - "torpedo_2_0"
      - "torpedo_2/yolo"
    x: 0.319
    y: 0.336
  - name: centre_view
    parents:
      - "torpedo/centre"
    z: -0.55
    roll: -90.0
    pitch: -90.0
  - name: shoot_view
    parents:
      - "torpedo_1_0/fish"
      - "torpedo_1_0/shark"
      - "torpedo_2_0/fish"
      - "torpedo_2_0/shark"
    z: -0.45
    roll: -90.0
    pitch: -90.0

bin:
  - name: top_view
    parents:
      - "bin/centre"
      - "bin/fish"
      - "bin/shark"
      - "bin/fish/rotated"
      - "bin/shark/rotated"
    z: -0.65
    yaw: -90.0
