# tmuxp DEBUG session for the multivehicle examples (run INSIDE the
# multivehicle_examples container). Brings up the full stack — the simulator
# (multivehicle_sim) AND the example apps (missions, BlueBoat control, the PX4
# offboard flight demo) — plus the dashboard. Load with:
#
#   tmuxp load /root/HOST/mvsim_ws/src/examples/multivehicle/tmuxp/mvsim_debug.yaml
#
# Every command is PRE-TYPED but NOT executed (enter: false) so you start them in
# dependency order and watch each one. Recommended order:
#
#   1) world      — bring up Gazebo + the course first       (multivehicle_sim)
#   2) bluerov    — BlueROV2 + ArduSub/MAVROS, then its square-dive mission
#   3) boat       — BlueBoat spawn + control stack + square mission
#   4) drone      — XRCE agent + PX4 SITL x500 + gz bridge + offboard demo
#   5) dashboard  — web backend (:8080) + sim-side LED/incident bridges
#   6) debug      — free shell + Foxglove bridge
#
# Workspace dir defaults to /root/HOST/mvsim_ws. Override with WS_DIR:
#   WS_DIR=/root/HOST/my_ws tmuxp load .../mvsim_debug.yaml
#
# NVIDIA hosts: uncomment the two PRIME-offload exports in shell_command_before.

session_name: mvsim

global_options:
  mouse: 'on'
  history-limit: 50000

shell_command_before:
  - 'WS_DIR="${WS_DIR:-/root/HOST/mvsim_ws}"'
  # - export __NV_PRIME_RENDER_OFFLOAD=1
  # - export __GLX_VENDOR_LIBRARY_NAME=nvidia
  - source /opt/ros/humble/setup.bash
  - '[ -f "$WS_DIR/install/setup.bash" ] && source "$WS_DIR/install/setup.bash"'
  - cd "$WS_DIR"

windows:
  # 1. Gazebo world (sim).
  - window_name: world
    focus: true
    panes:
      - shell_command:
          - cmd: ros2 launch multivehicle_sim world.launch.py world_name:=robotx_2026_sg_river
            enter: false

  # 2. BlueROV2 — spawn + ArduSub + MAVROS (sim, top); square-dive mission
  #    (examples, bottom).
  - window_name: bluerov
    layout: even-vertical
    panes:
      - shell_command:
          - cmd: ros2 launch multivehicle_sim bluerov.launch.py
            enter: false
      - shell_command:
          - cmd: ros2 launch multivehicle_examples bluerov_mission.launch.py
            enter: false

  # 3. BlueBoat — spawn (sim, top); control stack + square mission (examples,
  #    bottom; use_mission:=true runs the demo course through the LOS controller).
  - window_name: boat
    layout: even-vertical
    panes:
      - shell_command:
          - cmd: ros2 launch multivehicle_sim boat.launch.py
            enter: false
      - shell_command:
          - cmd: ros2 launch multivehicle_examples boat_control.launch.py use_mission:=true
            enter: false

  # 4. PX4 x500 drone — agent + PX4 SITL + gz bridge (sim), then the offboard
  #    flight demo (examples). Start top-to-bottom; offboard needs agent + PX4.
  - window_name: drone
    layout: even-vertical
    panes:
      - shell_command:
          - cmd: MicroXRCEAgent udp4 -p 8888
            enter: false
      - shell_command:
          - cmd: PX4_GZ_STANDALONE=1 PX4_SYS_AUTOSTART=4010 PX4_UXRCE_DDS_NS=x500 PX4_PARAM_UXRCE_DDS_SYNCT=0 PX4_GZ_MODEL_POSE="47.40,-388.95,3.85,0,0.0" /root/px4/px4_sitl/bin/px4 -w /root/px4/px4_sitl/romfs -i 1
            enter: false
      - shell_command:
          - cmd: ros2 launch multivehicle_sim uav_gz.launch.py model_name:=x500_mono_cam_1
            enter: false
      - shell_command:
          - cmd: ros2 launch multivehicle_examples px4_offboard.launch.py
            enter: false

  # 5. Dashboard — fake vehicle (RoboCommand :9000), web backend (:8080), and the
  #    sim-side LED/incident bridges (bridges_pkg=multivehicle_sim, models from
  #    bb_worlds) tracking all three vehicles' /…/odom.
  - window_name: dashboard
    layout: even-vertical
    panes:
      - shell_command:
          - cmd: ros2 run bb_robotx_dashboard fake_vehicle_publisher --port 9000
            enter: false
      - shell_command:
          - cmd: ros2 launch bb_robotx_dashboard dashboard.launch.py
            enter: false
      - shell_command:
          - cmd: ros2 launch bb_robotx_dashboard robotx_2026_sim.launch.py bridges_pkg:=multivehicle_sim models_pkg:=bb_worlds auv_name:=bluerov auv_pose_topic:=/bluerov/odom asv_name:=blueboat asv_pose_topic:=/blueboat/odom uav_name:=x500 uav_pose_topic:=/x500/odom
            enter: false

  # 6. Debug — free shell + Foxglove bridge (ws://localhost:8765).
  - window_name: debug
    layout: even-vertical
    panes:
      - shell_command:
          - cmd: ros2 topic list
            enter: false
      - shell_command:
          - cmd: ros2 launch foxglove_bridge foxglove_bridge_launch.xml
            enter: false
